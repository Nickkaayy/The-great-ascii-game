<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Survival</title>
  <link rel="stylesheet" href="style.css">
  <!-- Optional retro font – remove the next line if you don't like it -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div id="chatLog"></div>
<div id="playerList"></div>

<div id="startScreen">
  <h1>ASCII Survival</h1>
  <input id="nameInput" placeholder="Your name" maxlength="15" value="Wanderer">
  <input id="charInput" placeholder="Symbol" maxlength="1" value="@">
  <button onclick="joinGame()">Join World</button>
</div>

<pre id="screen"></pre>

<input id="chatInput" placeholder="Type message and press Enter..." maxlength="100">

<div id="info">WASD = move • SPACE = center on self • Chat below</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
