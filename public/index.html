<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII WORLD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- START SCREEN -->
  <div id="startScreen">
    <div id="startBox">
      <div id="startTitle">
        <div class="title-line">█████ ██████ ██████ ██████</div>
        <div class="title-line">██ ██ ██     ██  ██ ██  ██</div>
        <div class="title-line">██ ██ ████   ██  ██ ██████</div>
        <div class="title-line">██ ██ ██     ██  ██ ██  ██</div>
        <div class="title-word">ASCII  WORLD  ──  ONLINE</div>
      </div>
      <div class="start-fields">
        <label>NAME<input id="nameInput" maxlength="15" value="Wanderer" autocomplete="off"></label>
        <label>SYMBOL<input id="charInput" maxlength="1" value="@" autocomplete="off"></label>
        <label>COLOR<input id="colorInput" type="color" value="#00ff88"></label>
      </div>
      <button id="joinBtn" onclick="joinGame()">[ ENTER WORLD ]</button>
      <div class="start-hint">WASD / ARROWS · SCROLL to zoom · ENTER to chat</div>
    </div>
  </div>

  <!-- GAME HUD -->
  <div id="hud" style="display:none">
    <canvas id="gameCanvas"></canvas>

    <div id="chatLog"></div>

    <div id="sidebar">
      <div id="sidebarTitle">PLAYERS</div>
      <div id="playerList"></div>
      <div id="coords">0, 0</div>
      <div id="zoomDisplay">ZOOM 1×</div>
    </div>

    <input id="chatInput" placeholder="press enter to chat..." maxlength="120" autocomplete="off">
    <div id="keyHints">WASD · SCROLL zoom · SPACE center</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
