<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASCII Survival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <h1>ASCII Survival</h1>
  <p>Enter your name and choose a symbol</p>
  <input id="nameInput" placeholder="Your name" maxlength="15" value="Wanderer">
  <input id="charInput" placeholder="Symbol" maxlength="1" value="@">
  <button onclick="joinGame()">Join World</button>
</div>

<pre id="screen"></pre>
<div id="info">Use arrows to move · SPACE to center on self</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
